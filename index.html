
<!DOCTYPE html>
<html>
<head>
<title>Chaajao Salary Calculator</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:40px;
}
.container{
    max-width:600px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
}
input{
    width:100%;
    padding:8px;
    margin:8px 0;
}
button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}
.result{
    margin-top:20px;
    background:#eef2ff;
    padding:15px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
<h2>Chaajao Salary Calculator</h2>

<label>Monthly Gross Salary</label>
<input type="number" id="gross" placeholder="50000">

<label>Total Late Minutes (Full Month)</label>
<input type="number" id="lateMinutes" placeholder="120">

<label>Total Overtime Minutes (Valid Only)</label>
<input type="number" id="otMinutes" placeholder="120">

<button onclick="calculateSalary()">Calculate Salary</button>

<div class="result" id="result"></div>
</div>

<script>

function calculateSalary(){

let gross = parseFloat(document.getElementById("gross").value);
let lateMinutes = parseFloat(document.getElementById("lateMinutes").value);
let otMinutes = parseFloat(document.getElementById("otMinutes").value);

if(!gross || gross <= 0){
    alert("Enter valid salary");
    return;
}

/* FIXED POLICY RATE */
let daily = gross / 30;
let hourly = daily / 9;
let perMinute = hourly / 60;

/* LATE CALCULATION */
let grace = 60;
let chargeableLate = lateMinutes > grace ? lateMinutes - grace : 0;
let lateDeduction = chargeableLate * perMinute;

/* OT CALCULATION (50 MIN RULE ALREADY FILTERED) */
let otHours = otMinutes / 60;
let otPay = otHours * hourly;

/* FINAL SALARY */
let netSalary = gross + otPay - lateDeduction;

document.getElementById("result").innerHTML = `
<b>Daily Rate:</b> ${daily.toFixed(2)} <br>
<b>Hourly Rate:</b> ${hourly.toFixed(2)} <br>
<b>Per Minute Rate:</b> ${perMinute.toFixed(2)} <br><br>

<b>Chargeable Late Minutes:</b> ${chargeableLate} <br>
<b>Late Deduction:</b> ${lateDeduction.toFixed(2)} <br><br>

<b>Overtime Pay:</b> ${otPay.toFixed(2)} <br><br>

<h3>Net Salary: ${netSalary.toFixed(2)}</h3>
`;

}

</script>

</body>
</html>
